name: Daily Data Update

# Run every day at 11:30 AM EST (4:30 PM UTC)
on:
  schedule:
    - cron: '30 16 * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install kenpompy requests databricks-sql-connector pandas pyarrow python-dotenv

      - name: Run data pull script
        timeout-minutes: 20
        env:
          KENPOM_EMAIL: ${{ secrets.KENPOM_EMAIL }}
          KENPOM_PASSWORD: ${{ secrets.KENPOM_PASSWORD }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python APIPull.py

      - name: Set up dbt
        timeout-minutes: 10
        run: |
          pip install dbt-databricks

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          cbb_analytics:
            outputs:
              dev:
                catalog: workspace
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                schema: default
                threads: 1
                token: ${{ secrets.DATABRICKS_TOKEN }}
                type: databricks
            target: dev
          EOF

      - name: Run dbt
        timeout-minutes: 30
        run: |
          cd cbb_analytics
          dbt deps
          dbt run

      - name: Generate game predictions
        timeout-minutes: 20
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python GamePredictions.py
          python GamePredictions.py --date 20260319
          python GamePredictions.py --date 20260320

      - name: Update game results
        timeout-minutes: 20
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python UpdateResults.py

      - name: Summary
        run: |
          echo "✅ Data pipeline completed successfully!"
          echo "📊 KenPom data refreshed"
          echo "🔄 dbt transformations applied"
          echo "🎯 Game predictions generated"
          echo "📈 Game results updated"
          echo "🌐 Dashboard will show updated data"
